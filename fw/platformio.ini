; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

[env]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipico
framework = arduino
board_build.core = earlephilhower
board_build.arduino.earlephilhower.usbstack = pico_sdk

; LittleFS filesystem
board_build.filesystem = littlefs
board_build.filesystem_size = 0.5m

lib_deps =
    adafruit/Adafruit NeoPixel@^1.15.5
    bodmer/TFT_eSPI@^2.5.43
    lvgl/lvgl@^8.3.11
    bblanchon/ArduinoJson@^7.0.0

; TFT_eSPI — ST7789 320x240, configured via build flags (no User_Setup.h needed)
build_flags =
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_CS=9
    -DTFT_SCLK=10
    -DTFT_MOSI=11
    -DTFT_RST=13
    -DTFT_DC=14
    -DTFT_BL=12
    -DTFT_BACKLIGHT_ON=HIGH
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=4000000
    -DTFT_MISO=-1
    ; LVGL — lv_conf.h is in src/
    -DLV_CONF_INCLUDE_SIMPLE=1
    -Isrc
    ; tusb-hid bundled with framework (needed by Keyboard.h)
    -I${platformio.packages_dir}/framework-arduinopico/libraries/tusb-hid/src

[env:pico]
upload_protocol = picotool
monitor_speed = 115200