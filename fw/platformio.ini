; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

[env]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipico
framework = arduino
board_build.core = earlephilhower

; LittleFS filesystem
board_build.filesystem = littlefs

lib_deps =
    adafruit/Adafruit NeoPixel@^1.15.5
    bodmer/TFT_eSPI@^2.5.43
    lvgl/lvgl@^8.3.11
    bblanchon/ArduinoJson@^7.0.0

; TFT_eSPI — ST7789 320x240, configured via build flags (no User_Setup.h needed)
build_flags =
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_CS=9
    -DTFT_SCLK=10
    -DTFT_MOSI=11
    -DTFT_RST=13
    -DTFT_DC=14
    -DTFT_BL=12
    -DTFT_BACKLIGHT_ON=HIGH
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DSMOOTH_FONT=1
    -DSPI_FREQUENCY=40000000
    ; LVGL — lv_conf.h is in src/
    -DLV_CONF_INCLUDE_SIMPLE=1
    -Isrc
    ; tusb-hid bundled with framework (needed by Keyboard.h)
    -I${platformio.packages_dir}/framework-arduinopico/libraries/tusb-hid/src

[env:pico]
upload_protocol = picotool
monitor_port = /dev/cu.usbmodem112201
monitor_speed = 115200

[env:pico_tigard]
monitor_port = /dev/cu.usbmodem112201
monitor_speed = 115200
upload_protocol = custom
upload_command = /opt/homebrew/bin/openocd -f tigard-swd.cfg -c "set USE_CORE 0" -f target/rp2040.cfg -c "rp2040.core0 configure -work-area-phys 0x20000000 -work-area-size 0x10000 -work-area-backup 0; gdb_port disabled; telnet_port disabled; tcl_port disabled; adapter speed 50; init; halt; mdw 0x00000010; mdw 0x20000000; flash write_image erase {$SOURCE} 0x10000000; exit"
debug_tool = custom
debug_server =
    /opt/homebrew/bin/openocd
    -f tigard-swd.cfg
    -c "set USE_CORE 0"
    -f target/rp2040.cfg
    -c "adapter speed 50"
debug_port = localhost:3333
